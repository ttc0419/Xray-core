version: 3

tasks:
  default:
    sources:
    - ./***.go
    generates:
    - xray
    env:
      CGO_ENABLED: 1
      GOARCH: arm64
      GOARM64: v8.4,crypto,lse
    cmd: go build -trimpath -ldflags "-s -w -buildid=" -o xray ./main

  openwrt:
    sources:
    - ./***.go
    generates:
    - xray
    env:
      CGO_ENABLED: 1
      CC: aarch64-linux-musl-gcc
      CGO_CFLAGS: -flto=auto -fno-plt -mcpu=cortex-a53+crypto -O3 -pipe -s
      GOOS: linux
      GOARCH: arm64
      GOARM64: v8.0,crypto
    cmds:
    - go build -trimpath -ldflags "-s -w -buildid=" -o xray ./main
    - aarch64-linux-gnu-objcopy --remove-section=.comment --remove-section=.eh_frame --remove-section=.hash xray xrays
    - aarch64-linux-gnu-strip --strip-section-headers xrays
    - mv xrays xray
    - upx xray
